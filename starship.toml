# Current line indicator — exaggerated curved hooked arrow (no background block).
# ↪ is a rightwards arrow with a looped hook tail; colored from the rose_pine palette.
[character]
success_symbol = "[↪](bold iris)"
error_symbol   = "[↪](bold love)"
vimcmd_symbol  = "[❮](bold foam)"

