"$schema" = 'https://starship.rs/config-schema.json'

# ════════════════════════════════════════════════════════════
#  Neon Tide · long sweeping arch
#  Requires a Nerd Font in your terminal (e.g. JetBrainsMono NF)
#  Place at: ~/.config/starship.toml
#  Mirrors lua/plugins/colorscheme.lua in ~/.config/nvim and
#  ~/.config/ghostty/themes/NeonTide — keep the three in sync.
# ════════════════════════════════════════════════════════════

palette = "neon_tide"
add_newline = true
command_timeout = 1000

# ── the arch ────────────────────────────────────────────────
# line 1:  ╭─  info ……… ────(sweep)──── duration  clock
# line 2:  ╰─❯
format = """
[╭─](fg:azure)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$nodejs$python$rust$golang$package\
$fill\
$cmd_duration\
$time
[╰─](fg:azure)$character """

# ── the sweeping thin line ──────────────────────────────────
[fill]
symbol = "─"
style = "fg:line"

# ── pointer (recolours on exit status / vim mode) ───────────
[character]
success_symbol = "[❯](bold fg:teal)"
error_symbol   = "[❯](bold fg:coral)"
vimcmd_symbol  = "[❯](bold fg:gold)"
vimcmd_replace_one_symbol = "[❯](bold fg:violet)"
vimcmd_replace_symbol     = "[❯](bold fg:violet)"
vimcmd_visual_symbol      = "[❯](bold fg:pink)"

# ── location ────────────────────────────────────────────────
[directory]
style = "bold fg:teal"
format = "[  $path ]($style)[$read_only]($read_only_style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = "  "
read_only_style = "fg:coral"
home_symbol = " ~"

[username]
show_always = false
style_user = "fg:violet"
style_root = "fg:coral"
format = "[$user ]($style)"

[hostname]
ssh_only = true
style = "fg:azure"
format = "[@$hostname ]($style)"

# ── git ─────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "fg:violet"
format = "[on ](fg:subtle)[$symbol$branch ]($style)"

[git_status]
style = "fg:coral"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚔ "
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕ ⇡${ahead_count} ⇣${behind_count} "
untracked  = "? "
stashed    = " "
modified   = "! "
staged     = "+ "
renamed    = "» "
deleted    = "✘ "

[git_metrics]
disabled = false
added_style   = "fg:green"
deleted_style = "fg:coral"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'

# ── languages (subtle, only when relevant) ──────────────────
[nodejs]
symbol = " "
style = "fg:green"
format = "[$symbol($version) ]($style)"

[python]
symbol = " "
style = "fg:gold"
format = "[$symbol($version) ]($style)"

[rust]
symbol = " "
style = "fg:coral"
format = "[$symbol($version) ]($style)"

[golang]
symbol = " "
style = "fg:azure"
format = "[$symbol($version) ]($style)"

[package]
symbol = " "
style = "fg:muted"
format = "[$symbol$version ]($style)"

# ── right side: duration + clock ────────────────────────────
[cmd_duration]
min_time = 500
style = "fg:gold"
format = "[  $duration ]($style)"

[time]
disabled = false
time_format = "%R"
style = "fg:muted"
format = "[  $time ]($style)"

# ════════════════════════════════════════════════════════════
#  Neon Tide — matches nvim colorscheme + Ghostty theme
# ════════════════════════════════════════════════════════════
[palettes.neon_tide]
base    = "#0c151d"
surface = "#19232d"
overlay = "#242f3b"
muted   = "#677583"
subtle  = "#95a1af"
text    = "#d5dde7"
coral   = "#f9667a"
gold    = "#f2ce59"
green   = "#7cd06a"
teal    = "#11d6a4"
azure   = "#6aaafe"
violet  = "#b888fa"
pink    = "#fa8cd7"
line    = "#323e4c"
